name: Docker CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        run: |
          echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build Docker image (versioned)
        run: |
          cd 02-docker/app
          docker build -t cloud-native-app:${VERSION} -t cloud-native-app:latest .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-app cloud-native-app:${VERSION}
          sleep 5

      - name: Test health endpoint
        run: |
          curl --fail http://localhost:5000/health

      - name: Simulate release step
        run: |
          echo "Image cloud-native-app:${VERSION} successfully built and tested"
